<main class="app-container">
  
  <!-- Back Button -->
  <a routerLink="/contact" class="back-button fade-in">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Back to Team
  </a>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state fade-in">
    <div class="spinner"></div>
    <p>Loading profile...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="error-message fade-in">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    {{ error }}
  </div>

  <!-- Profile Details -->
  <section *ngIf="memberDetails as details" class="profile-card glass-panel fade-in">
    
    <div class="card-header">
      <div class="header-content">
        <h1 class="member-name">{{ details.name }}</h1>
        <h2 class="designation">{{ details.designation }}</h2>
        <span class="role-badge">{{ details.role }}</span>
      </div>
    </div>

    <div class="card-body">
      <div class="bio-section">
        <h3>About</h3>
        <p class="detailed-bio">{{ details.detailedBio }}</p>
      </div>
    </div>

    <div class="card-footer">
      <h3>Contact Information</h3>
      <div class="contact-links">
        <a [href]="'mailto:' + details.email" class="contact-pill">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          {{ details.email }}
        </a>
        
        <a [href]="details.linkedIn" target="_blank" rel="noopener noreferrer" class="contact-pill linkedin">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
          LinkedIn Profile
        </a>
      </div>
    </div>

  </section>
</main>
