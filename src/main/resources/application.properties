# ================================================
# stock-info-service Application Configuration
# ================================================

# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=stock-info-service

# ================================================
# Alpha Vantage API Configuration
# ------------------------------------------------
# To use LIVE stock data for ALL tickers:
#   1. Get a free API key at: https://www.alphavantage.co/support/#api-key
#   2. Replace 'demo' below with your key, OR
#   3. Set the environment variable ALPHA_VANTAGE_API_KEY=<your-key>
#
# With the 'demo' key:
#   - Only 'IBM' returns live data from Alpha Vantage
#   - All other symbols use the built-in mock data engine
# ================================================
app.alphavantage.base-url=https://www.alphavantage.co/query
app.alphavantage.api-key=${ALPHA_VANTAGE_API_KEY:demo}

# ================================================
# HTTP Client Configuration
# ================================================
app.http.connect-timeout-ms=5000
app.http.read-timeout-ms=10000

# ================================================
# Spring Boot Actuator (Health Checks & Monitoring)
# Cloud-ready: exposes /actuator/health for load balancers
# ================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App Info (visible at /actuator/info)
info.app.name=stock-info-service
info.app.version=1.0.0
info.app.description=Microservice to retrieve real-time stock info

# ================================================
# Logging
# ================================================
logging.level.com.example.stockinfo=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
